<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cosimo</title>
<meta name="theme-color" content="#3FA3DB">
<script>document.documentElement.classList.add('js');</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================================================================
   COSIMO — teaser page.
   A dark, smoky, halftone-textured stage; an ethereal aurora drifting behind
   everything; a giant wordmark cropped by the bottom edge.
   ========================================================================== */
:root {
  --ink:        #FAFCFC;                /* clean white text */
  --ink-dim:    rgba(250, 252, 252, 0.92);
  --field:      #3FA3DB;                /* saturated azure (Pelmatech-style) */
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: "Figtree", system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--field);
  color: var(--ink);
  overflow: hidden;                     /* single full-viewport scene */
}

/* ---------------- Background stage ----------------
   Layers, back to front:
   1. field  — saturated azure with a static indigo shadow falling from the top
   2. drift  — huge blurred clouds of warm coral / magenta / indigo, plus a
               white light, all wandering slowly (the ethereal movement)
   3. flutes — vertical ribbed-glass texture over everything
   4. grain  — film noise over everything
   The stage isolates its blend modes so they never leak into the page. */
.stage {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  isolation: isolate;
  background:
    radial-gradient(130% 90% at 78% -10%, rgba(16, 30, 68, 0.22) 0%, rgba(16, 30, 68, 0) 55%),
    radial-gradient(120% 100% at 15% 110%, rgba(10, 40, 90, 0.28) 0%, rgba(10, 40, 90, 0) 60%),
    var(--field);
}

/* --- 2. drift: the ethereal colour field ---
   Huge, heavily-blurred clouds — warm coral, hot magenta, deep indigo — plus
   one white LIGHT (screen-blended so it glows), all wandering on slow,
   co-prime loops so the composition never repeats. Transform-only animation
   keeps everything on the compositor. --- */
.drift {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  will-change: transform, opacity;
  pointer-events: none;
}
.drift--coral {                          /* dominant warm centre cloud — proper orange */
  width: 85vmax; height: 60vmax;
  left: 8%; top: 18%;
  background: radial-gradient(ellipse at 45% 50%, rgba(255,150,82,0.9) 0%, rgba(252,116,70,0.5) 45%, rgba(0,0,0,0) 72%);
  animation: drift-coral 24s ease-in-out infinite alternate;
}
.drift--beige {                          /* warm cream glow — lifts the top-right corner */
  width: 80vmax; height: 55vmax;
  right: -18vmax; top: -12vmax;
  background: radial-gradient(ellipse at 50% 50%, rgba(247,226,188,0.85) 0%, rgba(240,206,158,0.38) 48%, rgba(0,0,0,0) 72%);
  animation: drift-beige 26s ease-in-out infinite alternate;
}
.drift--magenta {                        /* hot magenta, low sweep — brighter */
  width: 75vmax; height: 48vmax;
  left: 22%; bottom: -16vmax;
  background: radial-gradient(ellipse at 50% 45%, rgba(255,64,158,0.8) 0%, rgba(244,54,146,0.38) 48%, rgba(0,0,0,0) 74%);
  animation: drift-magenta 29s ease-in-out infinite alternate;
}
.drift--pink {                           /* bright pink bloom, upper-centre */
  width: 55vmax; height: 42vmax;
  left: 38%; top: 24%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,112,196,0.8) 0%, rgba(255,92,182,0.34) 48%, rgba(0,0,0,0) 74%);
  animation: drift-pink 21s ease-in-out infinite alternate;
}
.drift--indigo {                         /* soft depth anchor, LOWER right (out of the top corner) */
  width: 75vmax; height: 52vmax;
  right: -22vmax; bottom: -18vmax;
  background: radial-gradient(ellipse at 50% 50%, rgba(26,46,102,0.5) 0%, rgba(28,50,106,0.22) 48%, rgba(0,0,0,0) 72%);
  animation: drift-indigo 33s ease-in-out infinite alternate;
}
.drift--cyan {                           /* bright azure pocket keeps the field luminous */
  width: 70vmax; height: 55vmax;
  left: -20vmax; bottom: -12vmax;
  background: radial-gradient(ellipse at 55% 45%, rgba(120,214,248,0.75) 0%, rgba(90,190,236,0.3) 50%, rgba(0,0,0,0) 74%);
  animation: drift-cyan 27s ease-in-out infinite alternate;
}
.drift--light {                          /* a wandering white glow — the "light" */
  width: 60vmax; height: 45vmax;
  left: 30%; top: -10vmax;
  mix-blend-mode: screen;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.1) 45%, rgba(0,0,0,0) 70%);
  animation: drift-light 19s ease-in-out infinite alternate;
}
/* Each cloud both WANDERS (translate/rotate) and GLOWS (scale + opacity swell
   and fade), so the colours pulse like breathing light as they move. The
   brightness peak coincides with the scale peak mid-cycle — a bloom — then
   dims toward the ends. Different phases per cloud keep the room alive. */
@keyframes drift-coral {
  0%   { transform: translate(0, 0) rotate(-8deg) scale(0.95);  opacity: 0.65; }
  50%  { transform: translate(9vw, -6vh) rotate(4deg) scale(1.18); opacity: 1; }
  100% { transform: translate(-6vw, 5vh) rotate(-14deg) scale(0.92); opacity: 0.7; }
}
@keyframes drift-magenta {
  0%   { transform: translate(0, 0) rotate(6deg) scale(1);       opacity: 0.55; }
  50%  { transform: translate(-10vw, -5vh) rotate(-6deg) scale(1.2); opacity: 1; }
  100% { transform: translate(7vw, 3vh) rotate(10deg) scale(0.9);  opacity: 0.65; }
}
@keyframes drift-indigo {
  0%   { transform: translate(0, 0) rotate(0deg) scale(1);       opacity: 0.8; }
  50%  { transform: translate(-7vw, 6vh) rotate(-7deg) scale(1.14); opacity: 1; }
  100% { transform: translate(4vw, -4vh) rotate(5deg) scale(1.02); opacity: 0.85; }
}
@keyframes drift-cyan {
  0%   { transform: translate(0, 0) rotate(0deg) scale(0.96);    opacity: 0.6; }
  50%  { transform: translate(8vw, -7vh) rotate(8deg) scale(1.12); opacity: 1; }
  100% { transform: translate(-5vw, 4vh) rotate(-6deg) scale(0.94); opacity: 0.68; }
}
@keyframes drift-light {
  0%   { transform: translate(0, 0) scale(0.9);        opacity: 0.35; }
  45%  { transform: translate(14vw, 10vh) scale(1.3);  opacity: 0.9; }
  100% { transform: translate(-10vw, 4vh) scale(0.85); opacity: 0.45; }
}
@keyframes drift-beige {
  0%   { transform: translate(0, 0) rotate(4deg) scale(0.95);   opacity: 0.6; }
  50%  { transform: translate(-8vw, 6vh) rotate(-5deg) scale(1.16); opacity: 1; }
  100% { transform: translate(5vw, -4vh) rotate(7deg) scale(0.94);  opacity: 0.7; }
}
@keyframes drift-pink {
  0%   { transform: translate(0, 0) rotate(-5deg) scale(0.92);  opacity: 0.5; }
  50%  { transform: translate(10vw, 6vh) rotate(6deg) scale(1.22); opacity: 1; }
  100% { transform: translate(-7vw, -5vh) rotate(-9deg) scale(0.9); opacity: 0.6; }
}

/* --- 3. grain: the SAME texture as the light-mode landing page ---
   The site's grain.png (dark flecks, faint alpha), tiled at the landing
   page's 130px (110px on mobile), normal blend — laid over everything so
   the whole scene reads as one printed surface. */
.tex-grain {
  position: fixed;
  inset: 0;
  z-index: 30;
  pointer-events: none;
  background-image: url("/grain.png");
  background-size: 130px 130px;
  background-repeat: repeat;
  opacity: 1;
  mix-blend-mode: normal;
}

/* ---------------- Centre copy ---------------- */
.middle {
  position: relative;
  z-index: 5;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 1.5rem;
  /* sit the copy slightly above centre, like the mockup */
  padding-bottom: 14vh;
}
.logo {
  width: 5.6rem;
  height: auto;
  margin-bottom: 2.6rem;
  color: var(--ink);
  filter: drop-shadow(0 1px 8px rgba(16, 38, 84, 0.4));
}
/* Build: the circles appear ONE BY ONE, clockwise. Each starts as a point at
   the rosette centre and grows while it slides out into its slot — rotate(--a)
   sets its direction, translateX the travel, scale the growth. --i staggers
   the twelve builds around the ring; the delay is set as a longhand AFTER the
   shorthand in the same rule (the shorthand's implicit 0s would silently win
   from a lower-specificity rule). Starts once the wordmark has landed.
   No-JS shows the finished rosette. */
.logo circle {
  transform-origin: 80px 80px;
  transform: rotate(var(--a)) translateX(25px);
}
/* Entrance: the mark whirls in (scale + spin easing to rest) while the inner
   group spins continuously — so it arrives spinning and never stops. Two
   elements = two composing rotations. Gated on .ready (paint-safe). */
html.js .logo { opacity: 0; }
html.js.ready .logo {
  animation: logo-in 1.15s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
}
@keyframes logo-in {
  from { opacity: 0; transform: scale(0.35) rotate(-250deg); }
  55%  { opacity: 1; }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}
.logo g {
  transform-origin: 80px 80px;
  animation: logo-spin 16s linear infinite;
}
@keyframes logo-spin { to { transform: rotate(360deg); } }
/* Kept for the click easter egg (is-replaying) below. */
@keyframes logo-grow {
  from { transform: rotate(var(--a)) translateX(0) scale(0); opacity: 0; }
  30%  { opacity: 1; }
  to   { transform: rotate(var(--a)) translateX(25px) scale(1); opacity: 1; }
}

/* Easter egg: click the rosette and it rewinds — circles peel off in reverse
   order (anticlockwise), accelerating back into the centre, hold collapsed,
   then the clockwise build replays (without the entrance's 0.8s handoff).
   Both rules must match the gated rule's specificity or its delays win. */
.logo { cursor: pointer; }
html.js.ready .logo.is-collapsing circle {
  animation: logo-collapse 0.39s cubic-bezier(0.55, 0, 0.68, 0.19) both;
  animation-delay: calc((11 - var(--i)) * 63ms);
}
html.js.ready .logo.is-replaying circle {
  animation: logo-grow 0.39s cubic-bezier(0.22, 1, 0.36, 1) both;
  animation-delay: calc(var(--i) * 63ms);
}
@keyframes logo-collapse {
  from { transform: rotate(var(--a)) translateX(25px) scale(1); opacity: 1; }
  70%  { opacity: 1; }
  to   { transform: rotate(var(--a)) translateX(0) scale(0); opacity: 0; }
}
.pitch {
  max-width: 21em;
  margin: 0;
  font-family: "Figtree", system-ui, -apple-system, sans-serif;
  font-size: clamp(1.02rem, 1.35vw, 1.25rem);
  font-weight: 500;
  line-height: 1.5;
  color: var(--ink-dim);
  /* a whisper of cool shadow so white copy holds on the palest drift */
  text-shadow: 0 1px 14px rgba(16, 38, 84, 0.35);
}
.statement {
  margin: 0 0 1.25rem;
  font-family: "Figtree", system-ui, -apple-system, sans-serif;
  font-size: clamp(2.2rem, 5vw, 4rem);
  font-weight: 700;
  line-height: 1.02;
  letter-spacing: -0.03em;
  color: var(--ink);
  text-shadow: 0 2px 22px rgba(16, 38, 84, 0.4);
}
.ctas {
  display: flex;
  gap: 0.9rem;
  margin-top: 2.3rem;
  flex-wrap: wrap;
  justify-content: center;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.82rem 1.45rem;
  border-radius: 100px;
  font-family: "Figtree", system-ui, -apple-system, sans-serif;
  font-size: 1rem;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
}
.btn svg { width: 0.82rem; height: 0.82rem; }
.btn--ghost { color: var(--ink); border: 1px solid rgba(255, 255, 255, 0.5); }
.btn--solid { background: #F7F7F5; color: #16233A; border: 1px solid #F7F7F5; }
@media (hover: hover) {
  .btn:hover { transform: translateY(-1px); }
  .btn--ghost:hover { border-color: #ffffff; background: rgba(255, 255, 255, 0.14); }
  .btn--solid:hover { background: #ffffff; border-color: #ffffff; }
}

/* Copy entrance: fade up, gated on .ready (each rule holds its own delay so
   the animation shorthand's implicit 0s can't override it). */
html.js .reveal { opacity: 0; }
html.js.ready .statement.reveal { animation: fade-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both; }
html.js.ready .pitch.reveal     { animation: fade-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.34s both; }
html.js.ready .ctas.reveal      { animation: fade-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.48s both; }
@keyframes fade-up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}

/* ---------------- Vertical spine labels ----------------
   Rotated marginalia running up the left edge and down the right. */
.vlabel {
  position: fixed;
  top: 50%;
  z-index: 6;
  font-family: "Figtree", system-ui, -apple-system, sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.62);
  text-shadow: 0 1px 12px rgba(16, 38, 84, 0.4);
  white-space: nowrap;
  pointer-events: none;
  user-select: none;
  writing-mode: vertical-rl;
}
.vlabel--left  { left: 1.7rem;  transform: translateY(-50%) rotate(180deg); }   /* reads up */
.vlabel--right { right: 1.7rem; transform: translateY(-50%); }                  /* reads down */
html.js .vlabel { opacity: 0; }
html.js.ready .vlabel { animation: vlabel-in 0.9s ease 0.9s both; }
@keyframes vlabel-in { from { opacity: 0; } to { opacity: 1; } }

/* ---------------- Giant wordmark ----------------
   Fills the viewport edge-to-edge and is cropped by the bottom of the screen.
   Flex space-between letters = exact edge-to-edge fit at any width; slight
   negative margins push the first/last glyphs past the edges like the mockup. */
.wordmark {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  z-index: 4;                     /* under the halftone/grain? no — stage is z0; this sits over stage, under nothing else */
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  /* Letters fully visible: sides bleed a touch past the edges, and the bottom
     margin only eats the font's built-in descender padding so the caps sit
     flush on the screen edge without being cropped. */
  margin: 0 -2.2vw -4.4vw;
  font-weight: 800;
  font-size: 24vw;
  line-height: 1;
  letter-spacing: -0.02em;
  color: rgba(255, 255, 255, 0.5);
  user-select: none;
  pointer-events: none;
}
/* Entrance: the letters rise from below the screen one by one, in quick
   succession from the RIGHT (the trailing O leads, the C lands last), each
   settling softly. The animation is gated on html.ready — added by JS one
   frame after the web font has loaded — because a pure load-time CSS
   animation can finish BEFORE first paint on mobile (the render-blocking
   font fetch eats the whole animation window) and appear not to run at all.
   Letters hide below only when JS is present; no-JS just shows them. */
.wordmark span { display: block; }
html.js .wordmark span {
  transform: translateY(115%);
}
html.js.ready .wordmark span {
  animation: letter-in 0.36s cubic-bezier(0.16, 1, 0.3, 1) both;
}
/* Per-letter stagger (120ms steps). These MUST match the specificity of the
   gated shorthand above — the `animation:` shorthand implicitly resets
   animation-delay to 0s, and a lower-specificity delay rule loses to it,
   which made all six letters rise as one block. */
html.js.ready .wordmark span:nth-child(6) { animation-delay: 0.10s; }
html.js.ready .wordmark span:nth-child(5) { animation-delay: 0.16s; }
html.js.ready .wordmark span:nth-child(4) { animation-delay: 0.22s; }
html.js.ready .wordmark span:nth-child(3) { animation-delay: 0.28s; }
html.js.ready .wordmark span:nth-child(2) { animation-delay: 0.34s; }
html.js.ready .wordmark span:nth-child(1) { animation-delay: 0.40s; }
@keyframes letter-in {
  to { transform: translateY(0); }
}

/* ---------------- Reduced motion ---------------- */
@media (prefers-reduced-motion: reduce) {
  .drift { animation: none; }
  .wordmark span { animation: none !important; transform: none !important; }
  .logo { animation: none !important; opacity: 1 !important; transform: none !important; }
  .logo g { animation: none !important; transform: none !important; }
  .logo circle {
    animation: none !important;
    transform: rotate(var(--a)) translateX(25px) !important;
    opacity: 1 !important;
  }
  .reveal { animation: none !important; opacity: 1 !important; transform: none !important; }
  .vlabel { animation: none !important; opacity: 1 !important; }
}

/* ---------------- Mobile ---------------- */
@media (max-width: 700px) {
  /* Lighter blur on phones: rasterising 80px blurs tanks mobile frame rates,
     which is what smeared the letter stagger into a single movement. */
  .drift { filter: blur(44px); }
  .tex-grain { background-size: 110px 110px; }   /* finer grain, like the landing page */
  .middle { padding-bottom: 20vh; }
  .pitch { font-size: 1.02rem; }
  .wordmark { font-size: 26vw; margin-bottom: -4.8vw; }
  /* Keep the spine labels on mobile — tighter to the edges and smaller. */
  .vlabel { font-size: 0.56rem; letter-spacing: 0.16em; }
  .vlabel--left  { left: 0.5rem; }
  .vlabel--right { right: 0.5rem; }
}
</style>
</head>

<body>
  <div class="stage" aria-hidden="true">
    <div class="drift drift--indigo"></div>
    <div class="drift drift--cyan"></div>
    <div class="drift drift--beige"></div>
    <div class="drift drift--coral"></div>
    <div class="drift drift--magenta"></div>
    <div class="drift drift--pink"></div>
    <div class="drift drift--light"></div>
  </div>
  <div class="tex-grain" aria-hidden="true"></div>

  <main class="middle">
    <!-- Spirograph rosette: 12 circles whose centres ride a small ring.
         Every circle is drawn at the SAME spot (the 0° position) and rotated
         into place around the rosette centre by --a — so with all rotations
         at 0 the mark is a single circle, and animating each rotation fans
         it open into the full weave. -->
    <svg class="logo" viewBox="0 0 160 160" fill="none" stroke="currentColor"
         stroke-width="1.3" aria-hidden="true">
      <g>
        <circle cx="80" cy="80" r="48.5" style="--a: 0deg;   --i: 0"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 30deg;  --i: 1"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 60deg;  --i: 2"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 90deg;  --i: 3"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 120deg; --i: 4"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 150deg; --i: 5"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 180deg; --i: 6"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 210deg; --i: 7"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 240deg; --i: 8"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 270deg; --i: 9"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 300deg; --i: 10"/>
        <circle cx="80" cy="80" r="48.5" style="--a: 330deg; --i: 11"/>
      </g>
    </svg>

    <h1 class="statement reveal">Making is free.<br>Taste isn&#8217;t.</h1>
    <p class="pitch reveal">Cosimo is a creative house that sells judgment at fixed prices &mdash; for founders whose reputation has outgrown their craft.</p>
    <div class="ctas reveal">
      <a class="btn btn--ghost" href="#manifesto">Manifesto
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7M8 7h9v9"/></svg>
      </a>
      <a class="btn btn--solid" href="mailto:hello@cosimo.studio">Let&#8217;s talk
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7M8 7h9v9"/></svg>
      </a>
    </div>
  </main>

  <span class="vlabel vlabel--left" aria-hidden="true">It is not enough to create. We must care.</span>
  <span class="vlabel vlabel--right" aria-hidden="true">London &bull; Paris &bull; San Francisco</span>

  <div class="wordmark" aria-hidden="true">
    <span>C</span><span>O</span><span>S</span><span>I</span><span>M</span><span>O</span>
  </div>

<script>
// Start the entrance only after the page is PAINTED. fonts.ready is not
// enough — it can resolve before the render-blocking font CSS has even
// loaded, so on mobile the animation still finished behind the blank first
// paint. window load (all blocking resources done) + a double rAF (rAF only
// fires once the browser is producing real frames) guarantees at least one
// visible frame before the letters start to rise. The timeout is a slow-
// network cap; it goes through the same rAF gate, so it can't beat paint.
(function () {
  var done = false;
  function fire() {
    if (done) return;
    done = true;
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        document.documentElement.classList.add('ready');
      });
    });
  }
  if (document.readyState === 'complete') fire();
  else window.addEventListener('load', fire);
  setTimeout(fire, 3000);

  // Click the rosette: rewind anticlockwise into one point, hold, rebuild.
  var logo = document.querySelector('.logo');
  if (logo) logo.addEventListener('click', function () {
    if (logo._busy || !document.documentElement.classList.contains('ready')) return;
    logo._busy = true;
    logo.classList.remove('is-replaying');
    logo.classList.add('is-collapsing');            /* rewind (~1.1s), hold… */
    setTimeout(function () {
      logo.classList.remove('is-collapsing');
      logo.classList.add('is-replaying');           /* …then rebuild */
      setTimeout(function () { logo._busy = false; }, 1200);
    }, 3300);
  });

  // iOS restores the page from the back-forward cache with all animations
  // already finished — replay the entrance so returning visitors see it too.
  window.addEventListener('pageshow', function (e) {
    if (!e.persisted) return;
    var root = document.documentElement;
    root.classList.remove('ready');
    void root.offsetWidth;                 /* flush, so re-adding restarts */
    root.classList.add('ready');
  });
})();
</script>
</body>
</html>
