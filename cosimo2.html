<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosimo — all sky, no limit</title>
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  :root {
    /* a bit of breathing room on all four sides of the image */
    --pad: clamp(1.5rem, 5vmin, 4rem);
  }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: #fff;                       /* white page */
    padding: var(--pad);
    display: grid;
    place-items: center;                    /* image sits centred in the padded frame */
    font-family: "Figtree", system-ui, -apple-system, sans-serif;
  }

  /* Wraps tightly around the image so the caption can anchor to the image's
     own top-left corner (not the viewport's). */
  .frame {
    position: relative;
    line-height: 0;                         /* kill descender gap under the img */
  }

  /* Constrain the image against the padded viewport so the whole thing is
     always visible, whatever the aspect ratio of the window. */
  .frame img {
    display: block;
    max-width: calc(100dvw - 2 * var(--pad));
    max-height: calc(100dvh - 2 * var(--pad));
    width: auto;
    height: auto;
    object-fit: contain;
  }

  /* White caption, top-left, matched to the landing page's "Hi, I'm Nico." */
  .caption {
    position: absolute;
    top: clamp(1rem, 3.2vmin, 2.5rem);
    left: clamp(1rem, 3.2vmin, 2.5rem);
    margin: 0;
    color: #fff;
    font-size: clamp(1.7rem, 3.3vw, 3.4rem);
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.018em;
    text-rendering: optimizeLegibility;
  }
</style>

<div class="frame">
  <img src="retro-desktop.png" alt="Retro desktop scene">
  <p class="caption">all sky, no limit</p>
</div>
