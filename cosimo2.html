<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosimo — all sky, no limit</title>
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  :root {
    /* margin around the full-page image */
    --pad: clamp(1.25rem, 3.5vmin, 3rem);
  }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: #212121;                    /* dark page margins */
    padding: var(--pad);
    display: grid;
    place-items: stretch;                   /* image fills the padded frame */
    font-family: "Figtree", system-ui, -apple-system, sans-serif;
  }

  /* Fills the whole padded viewport so the image reaches every edge and the
     caption can anchor to the image's top-left corner. */
  .frame {
    position: relative;
    line-height: 0;                         /* kill descender gap under the img */
    width: 100%;
    height: 100%;
  }

  /* The canvas covers the entire padded frame; the image is drawn onto it in
     tile blocks that trickle in diagonally (see the script below). */
  .frame canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* White caption, top-left, matched to the landing page's "Hi, I'm Nico".
     Fades in as the image finishes trickling into place. */
  .caption {
    position: absolute;
    top: clamp(1rem, 3.2vmin, 2.5rem);
    left: clamp(1rem, 3.2vmin, 2.5rem);
    margin: 0;
    color: #fff;
    font-size: clamp(1.7rem, 3.3vw, 3.4rem);
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.018em;
    text-rendering: optimizeLegibility;
    opacity: 0;
    animation: caption-in 900ms ease 1500ms forwards;
  }

  @keyframes caption-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .caption { opacity: 1; animation: none; transform: none; }
  }
</style>

<div class="frame">
  <canvas id="scene" aria-label="Retro desktop scene" role="img"></canvas>
  <p class="caption">all sky, no limit</p>
</div>

<script>
  (function () {
    var canvas = document.getElementById('scene');
    var ctx = canvas.getContext('2d');
    var img = new Image();
    img.src = 'retro-desktop.png';

    var TILE = 16;          // css px per tile block
    var DURATION = 2400;    // ms for the full top-left -> bottom-right sweep
    var JITTER = 0.32;      // scatter along the diagonal, for the "trickle" feel

    var dpr = Math.max(1, window.devicePixelRatio || 1);
    var reduce = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Cover-fit source rectangle: which part of the image maps onto the canvas
    // so it fills the frame (cropping the overflow), matching object-fit: cover.
    function coverSrc(cw, ch) {
      var scale = Math.max(cw / img.width, ch / img.height);
      var sw = cw / scale, sh = ch / scale;
      return { sx: (img.width - sw) / 2, sy: (img.height - sh) / 2, sw: sw, sh: sh };
    }

    var cw, ch, cols, rows, order, src;

    function build() {
      cw = canvas.clientWidth;
      ch = canvas.clientHeight;
      canvas.width = Math.round(cw * dpr);
      canvas.height = Math.round(ch * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cols = Math.ceil(cw / TILE);
      rows = Math.ceil(ch / TILE);
      src = coverSrc(cw, ch);

      // Order tiles by their diagonal position (top-left first), nudged by a
      // random amount so blocks trickle in rather than march in a clean line.
      order = [];
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var nx = (c + 0.5) / cols, ny = (r + 0.5) / rows;
          var key = (nx + ny) / 2 + (Math.random() - 0.5) * JITTER;
          order.push({ c: c, r: r, key: key });
        }
      }
      order.sort(function (a, b) { return a.key - b.key; });
    }

    function drawTile(t) {
      var x = t.c * TILE, y = t.r * TILE;
      var w = Math.min(TILE, cw - x) + 1;   // +1px to avoid hairline seams
      var h = Math.min(TILE, ch - y) + 1;
      ctx.drawImage(
        img,
        src.sx + (x / cw) * src.sw, src.sy + (y / ch) * src.sh,
        (w / cw) * src.sw, (h / ch) * src.sh,
        x, y, w, h
      );
    }

    function drawAll() { order.forEach(drawTile); }

    var revealed = 0, start = null, animating = false;

    function frame(now) {
      if (start === null) start = now;
      var p = Math.min(1, (now - start) / DURATION);
      var eased = 1 - Math.pow(1 - p, 2);          // ease-out
      var target = Math.floor(eased * order.length);
      for (; revealed < target; revealed++) drawTile(order[revealed]);
      if (p < 1) {
        requestAnimationFrame(frame);
      } else {
        for (; revealed < order.length; revealed++) drawTile(order[revealed]);
        animating = false;
      }
    }

    function run() {
      build();
      if (reduce) { drawAll(); return; }
      revealed = 0; start = null; animating = true;
      requestAnimationFrame(frame);
    }

    // On resize, refit to the new frame. Once the trickle has played, just
    // repaint the whole image; don't replay the animation.
    var resizeTimer;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        if (animating) { run(); } else { build(); drawAll(); }
      }, 150);
    });

    if (img.complete) { run(); } else { img.onload = run; }
  })();
</script>
