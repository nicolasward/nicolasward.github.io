<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosimo</title>
<meta name="robots" content="noindex">

<!-- js flips the page into "start compressed, then iris open" mode. Without it
     (or under reduced motion) the gradient is simply full-screen from the off. -->
<script>document.documentElement.classList.add('js');</script>

<!-- Preload the grain so it dithers the gradient at first paint (matches the
     landing page's "Hi, I'm Nico." treatment). -->
<link rel="preload" as="image" href="/grain.png" type="image/png">

<style>
  :root {
    /* Fallback gradient, shown if WebGL is unavailable. Keep it in the
       same colour family as PALETTE below so the swap is invisible. */
    --fallback: linear-gradient(135deg, #1B2A6B, #6E2594, #C2185B, #E85D2F);
    --noise-size: 130px;          /* signature grain tile — matches the landing page */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: #ffffff;           /* the white the dot sits on before it opens */
    overflow: hidden;
  }

  /* ---------------- Iris ----------------
     A circular window holding the WHOLE gradient (rendered into a square canvas
     so it stays "contained", not cropped). It starts as a tiny dot with the
     compressed gradient inside, then irises out — like the /cosimo intro — until
     it fills the screen. Oversized (140vmax) so at rest its circle clears the
     viewport corners on any aspect ratio; overflow clips the canvas to the ring.
     Default state is fully open, so no-JS / reduced-motion just see the gradient. */
  .iris {
    position: fixed;
    left: 50%; top: 50%;
    width: 140vmax; height: 140vmax;
    border-radius: 50%;
    overflow: hidden;
    z-index: 0;
    transform: translate(-50%, -50%) scale(1);
    will-change: transform;
  }
  html.intro .iris {
    animation: iris-open 1.15s cubic-bezier(0.7, 0, 0.25, 1) 0.2s both;
  }
  @keyframes iris-open {
    from { transform: translate(-50%, -50%) scale(0.014); }   /* ~ a 2.5vmax dot */
    to   { transform: translate(-50%, -50%) scale(1); }
  }

  /* The mesh gradient fills the (square) iris. */
  #gradient {
    display: block;
    width: 100%;
    height: 100%;
    background: var(--fallback);
  }

  /* The landing page's signature graininess, overlaid on top of the animation.
     A tiled dark-fleck PNG — same tile size and treatment as the hero. Kept as a
     separate, unscaled layer so it stays crisp at the true tile size; it fades in
     as the iris finishes opening (and is invisible over the white before then). */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image: url("/grain.png");
    background-size: var(--noise-size) var(--noise-size);
    background-repeat: repeat;
    mix-blend-mode: normal;
    opacity: 1;
  }
  html.intro .grain {
    animation: grain-in 0.5s ease 1.1s both;   /* 0 during the iris, then fades in */
  }
  @keyframes grain-in { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 640px) {
    :root { --noise-size: 110px; }   /* finer grain on mobile, as on the landing page */
  }

  @media (prefers-reduced-motion: reduce) {
    html.intro .iris  { animation: none; transform: translate(-50%, -50%) scale(1); }
    html.intro .grain { animation: none; opacity: 1; }
  }
</style>

<div class="iris"><canvas id="gradient"></canvas></div>
<div class="grain" aria-hidden="true"></div>

<script>
/* Kick off the iris the same way /cosimo does: add the class after the first
   paint (two rAFs) so the dot->full expansion is seen, not skipped. Reduced
   motion leaves the default (already-open) state alone. */
(function () {
  var root = document.documentElement;
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  requestAnimationFrame(function () {
    requestAnimationFrame(function () { root.classList.add('intro'); });
  });
})();
</script>

<script>
/* ============================================================
   CONFIG — this is the only part you normally need to touch.
   ============================================================ */
const PALETTE = [
  [0.106, 0.165, 0.420],  // deep indigo
  [0.431, 0.145, 0.580],  // violet
  [0.761, 0.094, 0.365],  // magenta
  [0.910, 0.365, 0.184],  // ember orange
];
const SPEED = 0.10;   // higher = faster drift. 0.06–0.15 is the tasteful range.
const SCALE = 1.15;   // higher = more, smaller colour blobs.
const WARP  = 0.55;   // domain warp strength. This is what makes it liquid.

/* To convert a hex colour: #C2185B -> [0xC2/255, 0x18/255, 0x5B/255]
   i.e. [0.761, 0.094, 0.357]. Keep values 0–1, not 0–255. */

/* ============================================================
   The shader. Two ideas are doing all the work here:

   1. NOISE — smooth pseudo-random values that flow over time.
      This is what gives organic blobs instead of hard bands.
   2. DOMAIN WARPING — feeding noise into the *coordinates* of more
      noise. Cheap trick, enormous payoff: it's the difference
      between "blurry blobs" and "liquid metal".

   The last line adds grain. Don't remove it. 8-bit colour channels
   can't represent a smooth gradient across 1000px, so you get visible
   banding stripes. A tiny bit of noise dithers those away.
   ============================================================ */
const FRAG = `
precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform vec3  u_c0, u_c1, u_c2, u_c3;
uniform float u_scale, u_warp;

// -- 2D simplex noise (Ashima / Ian McEwan, MIT licensed) ------------
vec3 mod289(vec3 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
vec2 mod289(vec2 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
vec3 permute(vec3 x){ return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v){
  const vec4 C = vec4(0.211324865, 0.366025403, -0.577350269, 0.024390243);
  vec2 i  = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0))
                           + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x  = a0.x  * x0.x  + h.x  * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

void main(){
  // Aspect-corrected UVs, so blobs stay round on wide screens.
  vec2 uv = gl_FragCoord.xy / u_res.xy;
  uv.x *= u_res.x / u_res.y;
  uv *= u_scale;

  float t = u_time;

  // --- Domain warp: offset the sampling position using noise. ---
  vec2 q = vec2(
    snoise(uv + vec2(0.0, t * 0.6)),
    snoise(uv + vec2(5.2, 1.3) - t * 0.4)
  );
  vec2 p = uv + u_warp * q;

  // --- Three independent noise fields drive the colour mixing. ---
  float n0 = snoise(p * 0.9 + vec2(t * 0.5, 0.0));
  float n1 = snoise(p * 1.3 + vec2(-t * 0.35, 2.7));
  float n2 = snoise(p * 0.7 + vec2(1.9, t * 0.45));

  // smoothstep turns raw noise (-1..1) into soft 0..1 blend masks.
  vec3 col = u_c0;
  col = mix(col, u_c1, smoothstep(-0.65, 0.55, n0));
  col = mix(col, u_c2, smoothstep(-0.50, 0.70, n1));
  col = mix(col, u_c3, smoothstep(-0.30, 0.85, n2) * 0.85);

  // --- Grain / dither. Kills banding. Keep this. ---
  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453);
  col += (grain - 0.5) * 0.022;

  gl_FragColor = vec4(col, 1.0);
}`;

const VERT = `
attribute vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

/* ============================================================
   Boilerplate: compile, link, resize, draw.
   ============================================================ */
(function init(){
  const canvas = document.getElementById('gradient');
  const gl = canvas.getContext('webgl', { antialias: false, alpha: false });

  // No WebGL (old browser, blocked GPU) — the CSS fallback is already
  // painted underneath, so we just leave it and bail out silently.
  if (!gl) { canvas.remove(); return; }

  function compile(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  const vs = compile(gl.VERTEX_SHADER, VERT);
  const fs = compile(gl.FRAGMENT_SHADER, FRAG);
  if (!vs || !fs) { canvas.remove(); return; }

  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  gl.useProgram(prog);

  // One full-screen triangle. Cheaper than two triangles for a quad,
  // and the fragment shader is where all the actual work happens.
  gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const U = n => gl.getUniformLocation(prog, n);
  const uRes = U('u_res'), uTime = U('u_time');
  gl.uniform3fv(U('u_c0'), PALETTE[0]);
  gl.uniform3fv(U('u_c1'), PALETTE[1]);
  gl.uniform3fv(U('u_c2'), PALETTE[2]);
  gl.uniform3fv(U('u_c3'), PALETTE[3]);
  gl.uniform1f(U('u_scale'), SCALE);
  gl.uniform1f(U('u_warp'), WARP);

  function resize(){
    // Cap DPR at 2. A full-screen shader at DPR 3 on a phone is a
    // battery fire for zero visible gain.
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    // The iris canvas is oversized (140vmax square), so also cap the buffer's
    // longest side. The gradient is low-frequency and a crisp grain sits on top,
    // so a modest resolution is indistinguishable — and far cheaper per frame.
    const MAX_SIDE = 2000;
    const raw = Math.max(canvas.clientWidth, canvas.clientHeight) * dpr;
    const k = raw > MAX_SIDE ? MAX_SIDE / raw : 1;
    const w = Math.floor(canvas.clientWidth  * dpr * k);
    const h = Math.floor(canvas.clientHeight * dpr * k);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, w, h);
    }
  }

  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  function draw(ms){
    resize();
    // Respect reduced-motion: freeze on a nice static frame rather
    // than removing the gradient entirely.
    gl.uniform1f(uTime, reduced.matches ? 4.0 : (ms / 1000) * SPEED);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
