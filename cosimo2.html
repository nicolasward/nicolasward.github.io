<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosimo — all sky, no limit</title>
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  :root {
    /* thin white margin around the full-page image */
    --pad: clamp(0.5rem, 1.2vmin, 1rem);
  }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: #fff;                       /* white page */
    padding: var(--pad);
    display: grid;
    place-items: stretch;                   /* image fills the padded frame */
    font-family: "Figtree", system-ui, -apple-system, sans-serif;
  }

  /* Fills the whole padded viewport so the image reaches every edge and the
     caption can anchor to the image's top-left corner. */
  .frame {
    position: relative;
    line-height: 0;                         /* kill descender gap under the img */
    width: 100%;
    height: 100%;
  }

  /* Image covers the entire padded frame, cropping as needed so there is no
     white space inside the margin, whatever the window's aspect ratio. */
  .frame img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* White caption, top-left, matched to the landing page's "Hi, I'm Nico." */
  .caption {
    position: absolute;
    top: clamp(1rem, 3.2vmin, 2.5rem);
    left: clamp(1rem, 3.2vmin, 2.5rem);
    margin: 0;
    color: #fff;
    font-size: clamp(1.7rem, 3.3vw, 3.4rem);
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.018em;
    text-rendering: optimizeLegibility;
  }
</style>

<div class="frame">
  <img src="retro-desktop.png" alt="Retro desktop scene">
  <p class="caption">all sky, no limit</p>
</div>
