<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>nw</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400&display=swap" rel="stylesheet">

<style>
/* Shared design tokens — same names/values as the blog (css/style.css) so the
   landing page and blog read as one system. This page is standalone (it does
   not import Flexoki), so the few colours it needs are defined locally. */
:root {
  --noise-size: 130px;
  --noise-opacity: .4;

  --fg:         #100F0F;   /* ink — matches the blog's light-mode --fg */
  --field:      #ffffff;   /* gradient field (white stops) */
  --field-mid:  #f8fafc;   /* gradient midpoint (cool near-white) */
}

/* ---------------- Base ---------------- */
html {
  height: 100%;
  margin: 0;
  /* Gradient on the ROOT element so CSS propagates it to the whole canvas
     (overscroll + behind the status bar), guaranteeing full-screen coverage.
     The fixed .stage repaints the same gradient (plus blobs + noise) on top. */
  background: radial-gradient(120% 120% at 50% 100%, var(--field) 0%, var(--field-mid) 60%, var(--field) 100%);
}

body {
  min-height: 100vh;
  min-height: 100dvh; /* dynamic viewport: accounts for mobile browser chrome */
  margin: 0;
  font-family: "Noto Serif KR", serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--field); /* plain white — gradient lives on .stage */
  color: var(--fg);
}

/* The entire background stack (gradient + blobs + noise) lives inside this
   fixed, self-isolating layer so it always fills the viewport and the noise's
   mix-blend-mode reliably blends against the gradient + blobs (not the page). */
.stage {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;        /* clip the drifting blobs to the viewport */
  isolation: isolate;      /* give mix-blend a self-contained context */
  background: radial-gradient(120% 120% at 50% 100%, var(--field) 0%, var(--field-mid) 60%, var(--field) 100%);
}

.stage::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image: url("/grain.png");
  background-size: var(--noise-size) var(--noise-size);
  background-repeat: repeat;
  opacity: 1;
  mix-blend-mode: normal;
}

/* ---------------- Blobs ---------------- */
.blob {
  position: absolute;
  width: 36vmax; height: 36vmax;
  border-radius: 50%;
  filter: blur(100px);
  opacity: .35;
  will-change: transform;
}
.blob--teal   { background: radial-gradient(circle at 35% 35%, #7FE3D9 0%, #008080 38%, #86B3FF 72%, rgba(0,0,0,0) 74%); }
.blob--sunset { background: radial-gradient(circle at 65% 40%, #FFC6A0 0%, #FF791B 42%, #FFB066 74%, rgba(0,0,0,0) 76%); }
.blob--plum   { background: radial-gradient(circle at 30% 60%, #CBB7FF 0%, #7C6BEA 40%, #B9F7E8 74%, rgba(0,0,0,0) 76%); }

/* ---------------- Content ---------------- */
.container {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  height: 100vh;
  height: 100dvh; /* dynamic viewport so content never hides behind mobile chrome */
  width: 100%;
  padding: 0 clamp(2rem, 6vw, 10rem);
  box-sizing: border-box;
  padding-top: 35vh;
}

/* Shared entrance: a gentle fade + rise. Elements stagger in via their own
   animation-delay (profile → hero → CTA → links) for a smooth Apple-like
   cascade. fill: both holds each hidden during its delay (no flash). */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Profile */
.profile {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fade-up 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
}

.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center 38%; /* adjust vertical framing */
  transition: filter 0.6s ease, transform 0.4s ease;
  filter: grayscale(0%);
}

.profile img:hover {
  filter: grayscale(100%);
}

.profile h1 {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; /* match the blog */
  font-weight: 600;
  font-size: 22px;
  margin: 0;
  letter-spacing: -0.2px;
}

.profile p {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; /* match the blog */
  font-weight: 400;
  font-size: 18px;
  margin: 2px 0 0 0;
  opacity: 0.75;
  color: var(--fg);
}

/* Headline */
.intro {
  font-size: clamp(3rem, 5vw, 64px);
  font-weight: 400;
  line-height: 1.22;
  letter-spacing: -0.25px;
  color: var(--fg);
  text-rendering: optimizeLegibility;
  opacity: 0;
  animation: fade-up 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
}

/* machine / human — a single split-flap slot. One word sits in the sentence
   and flips machine ⇄ human on a timer (rolling upward like a departure board).
   The slot is locked to the WIDER word's width (set in JS) and the word is
   centred in it, so flipping never reflows the rest of the line. The word is
   the accent orange — the one moving, highlighted element of the hero. */
.sw {
  white-space: nowrap;
}
.sw .flap {
  display: inline-block;
  vertical-align: top;
  overflow: hidden;            /* the window: clips all but one cell */
  height: 1.22em;              /* one intro line box */
  line-height: 1.22em;
  text-align: center;          /* centre the shorter word in the reserved slot */
  color: #FF791B;              /* the dynamic word, in the signature accent */
}
.sw .flap__reel { display: block; }
.sw .flap__cell {
  display: block;
  height: 1.22em;
  line-height: 1.22em;
  white-space: nowrap;
}

/* "Read my writing" — primary call to action, sat midway between the hero
   and the footer links. */
.read-cta {
  display: inline-block;
  margin-top: clamp(3rem, 13vh, 10rem);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 500;
  font-size: clamp(1.05rem, 2.2vw, 1.25rem);
  letter-spacing: 0.3px;
  text-transform: lowercase;
  text-decoration: none;
  /* A soft light glow sweeps left-to-right through the text + chevron
     (clipped to the glyphs), like a shimmer running through. */
  background-image: linear-gradient(90deg,
    var(--fg) 0%, var(--fg) 44%, #c5c3ba 50%, var(--fg) 56%, var(--fg) 100%);
  background-size: 300% 100%;
  background-position: 100% 0;
  background-repeat: no-repeat;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  opacity: 0;
  animation: fade-up 1s cubic-bezier(0.22, 1, 0.36, 1) 0.9s both,
             cta-shimmer 4.5s ease-in-out 2s infinite;
}
@keyframes cta-shimmer {
  0%     { background-position: 100% 0; }   /* glow parked off-screen (right) */
  33.3%  { background-position: 0% 0; }     /* 1.5s sweep across, glow exits left */
  100%   { background-position: 0% 0; }     /* 3s rest — plain ink text */
}

/* No hover effects on touch devices (avoids sticky hover states on tap). */
@media (hover: none) {
  .profile img:hover { filter: grayscale(0%); }
  .links a:hover { text-shadow: none; }
}

@media (prefers-reduced-motion: reduce) {
  /* No entrance animation — show everything immediately. */
  .profile, .intro, .read-cta, .links {
    animation: none;
    opacity: 1;
    transform: none;
  }
  .links { transform: translateX(-50%); }
  .sw .flap { transition: none; }
}

/* ---------------- Bottom Links ---------------- */
.links {
  position: fixed;
  bottom: 5vh;
  left: 50%;
  transform: translateX(-50%);
  
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1.75rem;

  font-family: 'IBM Plex Mono', monospace;
  font-size: 15px;
  text-transform: lowercase;
  letter-spacing: 0.4px;

  opacity: 0;
  animation: fadein-links 1s cubic-bezier(0.22, 1, 0.36, 1) 1.2s both;

  text-align: center;
  color: var(--fg);
  z-index: 5;
}
@keyframes fadein-links {
  from { opacity: 0; transform: translate(-50%, 10px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

.links a {
  color: var(--fg);
  text-decoration: none;
  opacity: 0.8;
  transition: opacity 0.2s ease, text-shadow 0.2s ease;
}
.links a:hover {
  opacity: 1;
  text-shadow: 0 0 6px rgba(16,15,15,0.15);
}

@media (max-width: 700px) {
  :root { --noise-size: 110px; }   /* finer grain on mobile */

  .container {
    /* Centre the whole cluster vertically; extra bottom padding lifts it
       to optical centre so it clears the fixed links below. */
    padding: 4vh 1.5rem 16vh;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    justify-content: center;
  }

  /* Stack neatly: image → name → tagline */
  .profile {
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }

  .profile img {
    width: 88px;
    height: 88px;
  }

  .profile h1 {
    font-size: 20px;
    margin-top: 0.3rem;
  }

  .profile p {
    font-size: 15px;
    opacity: 0.7;
    margin-top: 0.2rem;
  }

  /* Grand, centred statement */
  .intro {
    font-size: clamp(2.3rem, 9vw, 3rem);
    line-height: 1.22;
    max-width: 100%;
    text-align: center;
    margin-top: 2.25rem;
  }

  /* Hold links at the bottom center, clear the home indicator safe area */
  .links {
    position: fixed;
    bottom: max(5vh, calc(env(safe-area-inset-bottom) + 12px));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    font-size: 15px;
    gap: 1.6rem;

    z-index: 5;
  }

  /* Smaller on mobile so the three blobs don't blanket the whole screen —
     leaving more of the paper field showing between them. */
  .blob {
    width: 40vmax;
    height: 40vmax;
    opacity: 0.4;
    /* Smaller blur on mobile: the one-time rasterization of a huge blurred
       element is expensive on phones, and at this size 50px looks ~identical. */
    filter: blur(50px);
  }
}
</style>
</head>

<body>
  <div class="stage" aria-hidden="true">
    <div class="blob blob--teal"></div>
    <div class="blob blob--sunset"></div>
    <div class="blob blob--plum"></div>
  </div>

  <div class="container">
    <div class="profile">
      <img src="nico.jpg" alt="Profile photo" width="90" height="90" decoding="async" fetchpriority="high">
      <div>
        <h1>Nico Ward</h1>
        <p>ai &middot; design &middot; education</p>
      </div>
    </div>

    <div class="intro">I build <span class="sw"><span class="flap js-flap"><span class="flap__reel"><span class="flap__cell">machine</span><span class="flap__cell" aria-hidden="true">human</span></span></span></span> learning systems.</div>

    <a class="read-cta" href="/blog">Read my writing &#8250;</a>
  </div>

  <!-- Centered bottom links -->
  <div class="links">
    <a href="https://www.linkedin.com/in/nicolaswrd/" target="_blank">linkedin</a>
    <a href="mailto:ward.nicolas@outlook.com">email</a>
  </div>

<script>
const rand = (min, max) => Math.random() * (max - min) + min;
function randomPos(pad = 6) { return { x: rand(pad, 100 - pad), y: rand(pad, 100 - pad) }; }
function drift(blob, prev) {
  const next = randomPos();
  // Slow, independently-varying segments so the blobs drift organically rather
  // than retargeting on a shared heartbeat.
  const duration = rand(9000, 16000);
  // Translate only (no scale): scaling a heavily-blurred element forces the
  // browser to re-rasterize the blur every frame, which is the main source of
  // jank. A pure translate stays on the compositor and is cheap.
  const anim = blob.animate(
    [
      { transform: `translate(${prev.x}vw, ${prev.y}vh) translate(-50%, -50%)` },
      { transform: `translate(${next.x}vw, ${next.y}vh) translate(-50%, -50%)` }
    ],
    { duration, easing: 'ease-in-out', fill: 'forwards' }
  );
  anim.onfinish = () => drift(blob, next);
}
document.querySelectorAll('.blob').forEach(blob => {
  const start = randomPos();
  blob.style.transform = `translate(${start.x}vw, ${start.y}vh) translate(-50%, -50%)`;
  drift(blob, start);
});

// machine / human — a single split-flap slot. The word flips machine ⇄ human
// on a timer, rolling upward like a departure board, with the slot's width
// morphing to fit the new word so the sentence stays tight.
(function () {
  const flap = document.querySelector('.js-flap');
  if (!flap) return;
  const reel = flap.querySelector('.flap__reel');
  const A = reel.children[0], B = reel.children[1];
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const WORDS = ['machine', 'human'];
  const EASE = 'transform 0.6s cubic-bezier(0.83, 0, 0.17, 1)';
  let idx = 0;

  // Lock the slot to the WIDER word's width (re-measured on resize, since the
  // hero font is responsive) so flipping never reflows the surrounding text.
  function sizeSlot() {
    flap.style.width = 'auto';
    A.textContent = 'machine'; B.textContent = 'machine';
    const wM = A.getBoundingClientRect().width;
    A.textContent = 'human';   B.textContent = 'human';
    const wH = A.getBoundingClientRect().width;
    A.textContent = WORDS[idx]; B.textContent = WORDS[idx];
    flap.style.width = (Math.ceil(Math.max(wM, wH)) + 2) + 'px';  // +2 guards rounding
  }
  sizeSlot();
  reel.style.transition = 'none';
  reel.style.transform = 'translateY(0)';
  window.addEventListener('resize', sizeSlot);
  // Re-measure once the serif web font loads — the first pass uses the
  // fallback font's (narrower) metrics, which would clip "machine".
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(sizeSlot);

  // Start on "machine"; the off-screen cell is pre-set to the next word and the
  // reset folds into the next flip, so it always rolls up with no flicker.
  setInterval(function () {
    const next = (idx + 1) % WORDS.length;
    const h = flap.clientHeight;
    reel.style.transition = 'none';
    A.textContent = WORDS[idx];   // visible (current) — no flicker on reset
    B.textContent = WORDS[next];  // incoming, below
    reel.style.transform = 'translateY(0)';
    void reel.offsetWidth;        // commit the reset
    reel.style.transition = EASE;
    reel.style.transform = 'translateY(' + (-h) + 'px)';
    idx = next;
  }, 3000);
})();
</script>
</body>
</html>
