<article>
  <header class="post-header">
    <h1 class="post-title">{{title}}</h1>
    <div class="post-meta">
      {{date_formatted}}<span class="separator">&middot;</span>{{read_time}} minute read
    </div>
    {{share}}
  </header>

  <div class="post-content">
    {{content}}
  </div>

  {{reply}}

  <div class="post-share-section">
    <h2 class="eyebrow">Share this article</h2>
    {{share}}
  </div>

  {{linked_mentions}}

  <div class="related-posts">
    <h2 class="eyebrow">You might also enjoy</h2>
    <ul>
      {{related_posts}}
    </ul>
  </div>
</article>

<nav class="post-siblings" aria-hidden="true"
     data-newer-url="{{newer_url}}" data-newer-title="{{newer_title}}"
     data-older-url="{{older_url}}" data-older-title="{{older_title}}"></nav>

<div id="reading-progress" class="reading-progress" aria-hidden="true" title="Back to top">
  <svg class="progress-ring" viewBox="0 0 40 40">
    <defs>
      <!-- Knock the checkmark out of the solid disc so the page's colour glow
           reads through the tick (the disc itself stays fully opaque). The cut
           "draws" itself on completion via the dashoffset transition. -->
      <mask id="disc-check" maskUnits="userSpaceOnUse" x="0" y="0" width="40" height="40">
        <rect width="40" height="40" fill="white"/>
        <path class="check-cut" d="M13 20.5 L18 25.5 L28 14.5" fill="none" stroke="black"
              stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
              stroke-dasharray="22" stroke-dashoffset="22"/>
      </mask>
    </defs>
    <circle class="progress-disc" cx="20" cy="20" r="20" mask="url(#disc-check)"/>
    <circle class="progress-track" cx="20" cy="20" r="19" fill="none" stroke-width="1.54"/>
    <circle class="progress-fill" cx="20" cy="20" r="19" fill="none" stroke-width="1.54"
            stroke-dasharray="119.38" stroke-dashoffset="119.38"/>
  </svg>
  <span class="progress-percent">0%</span>
  <span class="progress-shine" aria-hidden="true"></span>
</div>
